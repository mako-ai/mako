name: Deploy App to Cloud Run

on:
  push:
    branches:
      - dev
      - master
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: true

env:
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  GCP_REGION: ${{ vars.GCP_REGION }}
  GCP_ARTIFACT_REPOSITORY: ${{ vars.GCP_ARTIFACT_REPOSITORY }}

permissions:
  contents: read
  id-token: write

jobs:
  build-and-deploy:
    name: Deploy ${{ github.ref_name == 'master' && 'production' || 'staging' }}
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.ref_name == 'master' && 'production' || 'staging' }}
    env:
      SERVICE_NAME: ${{ github.ref_name == 'master' && 'mako' || 'dev-mako' }}
      IMAGE_NAME: ${{ github.ref_name == 'master' && 'mako' || 'dev-mako' }}
      BASE_URL: ${{ github.ref_name == 'master' && 'https://app.mako.ai' || 'https://dev-app.mako.ai' }}
      CLIENT_URL: ${{ github.ref_name == 'master' && 'https://app.mako.ai' || 'https://dev-app.mako.ai' }}
      VITE_API_URL: ${{ github.ref_name == 'master' && 'https://app.mako.ai/api' || 'https://dev-app.mako.ai/api' }}
      GCP_SERVICE_ACCOUNT: ${{ github.ref_name == 'master' && secrets.GCP_PROD_SERVICE_ACCOUNT || secrets.GCP_DEV_SERVICE_ACCOUNT }}
      DATABASE_URL: ${{ github.ref_name == 'master' && secrets.PROD_DATABASE_URL || secrets.DEV_DATABASE_URL }}
      VITE_MUI_LICENSE_KEY: ${{ secrets.VITE_MUI_LICENSE_KEY }}
      GOOGLE_CLIENT_ID: ${{ vars.GOOGLE_CLIENT_ID }}
      GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
      GITHUB_CLIENT_ID: ${{ vars.GITHUB_CLIENT_ID }}
      GITHUB_CLIENT_SECRET: ${{ secrets.GITHUB_CLIENT_SECRET }}
      INNGEST_EVENT_KEY: ${{ vars.INNGEST_EVENT_KEY }}
      INNGEST_SIGNING_KEY: ${{ secrets.INNGEST_SIGNING_KEY }}
      SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
      SESSION_DURATION: ${{ vars.SESSION_DURATION }}
      BCRYPT_ROUNDS: ${{ vars.BCRYPT_ROUNDS }}
      RATE_LIMIT_WINDOW_MS: ${{ vars.RATE_LIMIT_WINDOW_MS }}
      RATE_LIMIT_MAX_REQUESTS: ${{ vars.RATE_LIMIT_MAX_REQUESTS }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint web app
        run: pnpm run --filter app lint

      - name: Lint API
        run: pnpm run --filter api lint

      - name: Build workspaces (Fail Fast Check)
        # We run this locally first because it's significantly faster than the Docker build.
        # If this fails, we save time by not attempting the Docker build.
        # Note: The artifacts produced here are NOT used in the Docker image;
        # the Dockerfile performs its own fresh build.
        run: pnpm run build
        env:
          BASE_URL: ${{ env.BASE_URL }}
          CLIENT_URL: ${{ env.CLIENT_URL }}
          VITE_API_URL: ${{ env.VITE_API_URL }}
          VITE_MUI_LICENSE_KEY: ${{ env.VITE_MUI_LICENSE_KEY }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ env.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Configure Docker auth
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Compute image URIs
        id: image
        run: |
          IMAGE_URI="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GCP_ARTIFACT_REPOSITORY}/${IMAGE_NAME}"
          echo "uri=${IMAGE_URI}" >> "$GITHUB_OUTPUT"
          echo "sha_tag=${IMAGE_URI}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "latest_tag=${IMAGE_URI}:latest" >> "$GITHUB_OUTPUT"

      - name: Create .env.production for Docker build
        env:
          VITE_API_URL: ${{ env.VITE_API_URL }}
          VITE_MUI_LICENSE_KEY: ${{ env.VITE_MUI_LICENSE_KEY }}
        run: |
          cat <<EOF > .env.production
          VITE_API_URL=${VITE_API_URL}
          VITE_MUI_LICENSE_KEY=${VITE_MUI_LICENSE_KEY}
          EOF

      - name: Build Docker image
        run: docker build --platform linux/amd64 -t ${{ steps.image.outputs.sha_tag }} .

      - name: Tag Docker image as latest
        run: docker tag ${{ steps.image.outputs.sha_tag }} ${{ steps.image.outputs.latest_tag }}

      - name: Push Docker images
        run: |
          docker push ${{ steps.image.outputs.sha_tag }}
          docker push ${{ steps.image.outputs.latest_tag }}

      - name: Clean temporary env.production file
        run: rm -f .env.production

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${SERVICE_NAME} \
            --image ${{ steps.image.outputs.sha_tag }} \
            --region ${GCP_REGION} \
            --timeout=600 \
            --min-instances=1 \
            --set-env-vars \
            BASE_URL=${BASE_URL}, \
            CLIENT_URL=${CLIENT_URL}, \
            VITE_API_URL=${VITE_API_URL}, \
            DATABASE_URL=${DATABASE_URL}, \
            GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}, \
            GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}, \
            GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}, \
            GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}, \
            INNGEST_EVENT_KEY=${INNGEST_EVENT_KEY}, \
            INNGEST_SIGNING_KEY=${INNGEST_SIGNING_KEY}, \
            SESSION_SECRET=${SESSION_SECRET}, \
            SESSION_DURATION=${SESSION_DURATION}, \
            BCRYPT_ROUNDS=${BCRYPT_ROUNDS}, \
            RATE_LIMIT_WINDOW_MS=${RATE_LIMIT_WINDOW_MS}, \
            RATE_LIMIT_MAX_REQUESTS=${RATE_LIMIT_MAX_REQUESTS}, \
            OPENAI_API_KEY=${OPENAI_API_KEY}, \
            ENCRYPTION_KEY=${ENCRYPTION_KEY}
            --quiet
