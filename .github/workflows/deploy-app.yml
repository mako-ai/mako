name: Deploy App to Cloud Run

on:
  push:
    branches:
      - master
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to rebuild ephemeral database for (leave empty for production deploy)"
        required: false
        type: string
      rebuild_db:
        description: "Rebuild ephemeral database from production"
        required: false
        type: boolean
        default: true

concurrency:
  group: deploy-${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || (github.event_name == 'workflow_dispatch' && inputs.pr_number != '' && format('pr-{0}', inputs.pr_number)) || github.ref_name }}
  cancel-in-progress: true

env:
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  GCP_REGION: ${{ vars.GCP_REGION }}
  GCP_ARTIFACT_REPOSITORY: ${{ vars.GCP_ARTIFACT_REPOSITORY }}
  GCS_DASHBOARD_BUCKET: revops-462013-dashboard-artifacts

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  # Detect if app or migrations have changed (for PR previews)
  detect-changes:
    name: Detect changes
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && inputs.pr_number != '')
    outputs:
      migrations_changed: ${{ steps.check.outputs.migrations_changed }}
      rebuild_ephemeral_db: ${{ steps.check.outputs.rebuild_ephemeral_db }}
      app_changed: ${{ steps.check.outputs.app_changed }}
      pr_number: ${{ steps.check.outputs.pr_number }}
      pr_ref: ${{ steps.pr-info.outputs.pr_ref }}
      pr_sha: ${{ steps.pr-info.outputs.pr_sha }}
    steps:
      - name: Get PR ref for workflow_dispatch
        id: pr-info
        if: github.event_name == 'workflow_dispatch' && inputs.pr_number != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_INFO=$(gh pr view ${{ inputs.pr_number }} --repo ${{ github.repository }} --json headRefName,headRefOid)
          PR_REF=$(echo "$PR_INFO" | jq -r '.headRefName')
          PR_SHA=$(echo "$PR_INFO" | jq -r '.headRefOid')
          echo "pr_ref=${PR_REF}" >> "$GITHUB_OUTPUT"
          echo "pr_sha=${PR_SHA}" >> "$GITHUB_OUTPUT"
          echo "Fetched PR #${{ inputs.pr_number }} head ref: ${PR_REF}, SHA: ${PR_SHA}"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.pr-info.outputs.pr_ref || github.ref }}

      - name: Check for changes
        id: check
        run: |
          # Determine PR number and event type
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            PR_NUM="${{ inputs.pr_number }}"
            IS_WORKFLOW_DISPATCH="true"
            REBUILD_DB_REQUESTED="${{ inputs.rebuild_db }}"
          else
            PR_NUM="${{ github.event.pull_request.number }}"
            IS_WORKFLOW_DISPATCH="false"
            REBUILD_DB_REQUESTED="false"
          fi
          echo "pr_number=${PR_NUM}" >> $GITHUB_OUTPUT

          # Always check git diff for migration changes (determines if PR uses ephemeral DB)
          MIGRATION_CHANGES=$(git diff origin/master...HEAD --name-only -- 'api/src/migrations/*.ts' | wc -l | tr -d ' ')
          echo "Found $MIGRATION_CHANGES migration file(s) changed"
          if [ "$MIGRATION_CHANGES" -gt 0 ]; then
            echo "migrations_changed=true" >> $GITHUB_OUTPUT
            MIGRATIONS_CHANGED="true"
          else
            echo "migrations_changed=false" >> $GITHUB_OUTPUT
            MIGRATIONS_CHANGED="false"
          fi

          # Determine if we should rebuild the ephemeral database
          # - For workflow_dispatch: only rebuild if rebuild_db=true
          # - For pull_request events: rebuild if migrations changed (first deploy or sync)
          if [ "$IS_WORKFLOW_DISPATCH" == "true" ]; then
            if [ "$REBUILD_DB_REQUESTED" == "true" ]; then
              echo "rebuild_ephemeral_db=true" >> $GITHUB_OUTPUT
              echo "Manual rebuild requested - will rebuild ephemeral database"
            else
              echo "rebuild_ephemeral_db=false" >> $GITHUB_OUTPUT
              echo "Manual deploy without rebuild - will use existing database"
            fi
          else
            # For PR events, rebuild ephemeral DB if migrations changed
            if [ "$MIGRATIONS_CHANGED" == "true" ]; then
              echo "rebuild_ephemeral_db=true" >> $GITHUB_OUTPUT
              echo "PR event with migrations - will rebuild ephemeral database"
            else
              echo "rebuild_ephemeral_db=false" >> $GITHUB_OUTPUT
            fi
          fi

          # Check for app-related changes (api, app, docker, dependencies, workflow)
          # For workflow_dispatch, always treat as changed to allow redeployment
          if [ "$IS_WORKFLOW_DISPATCH" == "true" ]; then
            echo "app_changed=true" >> $GITHUB_OUTPUT
            echo "Workflow dispatch - treating app as changed"
          else
            APP_CHANGES=$(git diff origin/master...HEAD --name-only -- \
              'api/**' \
              'app/**' \
              'Dockerfile' \
              'package.json' \
              'pnpm-lock.yaml' \
              'pnpm-workspace.yaml' \
              'tsconfig.json' \
              '.github/workflows/deploy-app.yml' \
              | wc -l | tr -d ' ')
            echo "Found $APP_CHANGES app-related file(s) changed"
            if [ "$APP_CHANGES" -gt 0 ]; then
              echo "app_changed=true" >> $GITHUB_OUTPUT
            else
              echo "app_changed=false" >> $GITHUB_OUTPUT
            fi
          fi

  # PR Preview Deployment
  deploy-preview:
    name: Deploy PR Preview
    runs-on: ubuntu-latest
    if: (github.event_name == 'pull_request' && needs.detect-changes.outputs.app_changed == 'true') || (github.event_name == 'workflow_dispatch' && inputs.pr_number != '')
    needs: detect-changes
    environment:
      name: pr-${{ needs.detect-changes.outputs.pr_number }}
      url: https://pr-${{ needs.detect-changes.outputs.pr_number }}.mako.ai
    env:
      PR_NUMBER: ${{ needs.detect-changes.outputs.pr_number }}
      BASE_URL: https://pr-${{ needs.detect-changes.outputs.pr_number }}.mako.ai
      CLIENT_URL: https://pr-${{ needs.detect-changes.outputs.pr_number }}.mako.ai
      VITE_API_URL: https://pr-${{ needs.detect-changes.outputs.pr_number }}.mako.ai/api
      # PR previews disable OAuth since redirect URLs can't be dynamically registered
      DISABLE_OAUTH: "true"
      # Staging secrets (from staging environment)
      BCRYPT_ROUNDS: ${{ vars.BCRYPT_ROUNDS }}
      DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
      ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
      GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_DEV_SERVICE_ACCOUNT }}
      GH_CLIENT_ID: ${{ vars.GH_CLIENT_ID }}
      GH_CLIENT_SECRET: ${{ secrets.GH_CLIENT_SECRET }}
      GOOGLE_CLIENT_ID: ${{ vars.GOOGLE_CLIENT_ID }}
      GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
      INNGEST_EVENT_KEY: ${{ vars.INNGEST_EVENT_KEY }}
      INNGEST_SIGNING_KEY: ${{ secrets.INNGEST_SIGNING_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GOOGLE_GENERATIVE_AI_API_KEY: ${{ secrets.GOOGLE_GENERATIVE_AI_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      RATE_LIMIT_MAX_REQUESTS: ${{ vars.RATE_LIMIT_MAX_REQUESTS }}
      RATE_LIMIT_WINDOW_MS: ${{ vars.RATE_LIMIT_WINDOW_MS }}
      SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
      SENDGRID_FROM_EMAIL: ${{ vars.SENDGRID_FROM_EMAIL }}
      SENDGRID_INVITATION_TEMPLATE_ID: ${{ vars.SENDGRID_INVITATION_TEMPLATE_ID }}
      SENDGRID_PASSWORD_RESET_TEMPLATE_ID: ${{ vars.SENDGRID_PASSWORD_RESET_TEMPLATE_ID }}
      SENDGRID_VERIFICATION_TEMPLATE_ID: ${{ vars.SENDGRID_VERIFICATION_TEMPLATE_ID }}
      SESSION_DURATION: ${{ vars.SESSION_DURATION }}
      SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
      VITE_MUI_LICENSE_KEY: ${{ secrets.VITE_MUI_LICENSE_KEY }}
      VITE_GTM_ID: ${{ vars.VITE_GTM_ID }}
      DEMO_DATABASE_URL: ${{ secrets.DEMO_DATABASE_URL }}
      DASHBOARD_ARTIFACT_PREFIX: dashboard-artifacts/pr-${{ needs.detect-changes.outputs.pr_number }}
    steps:
      - name: Set PR-specific variables
        id: pr-vars
        run: |
          echo "IMAGE_NAME=mako-pr-${PR_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "SERVICE_NAME=mako-pr-${PR_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.detect-changes.outputs.pr_ref || github.ref }}

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint web app
        run: pnpm run --filter app lint

      - name: Lint API
        run: pnpm run --filter api lint

      - name: Build workspaces (Fail Fast Check)
        run: pnpm run build
        env:
          BASE_URL: ${{ env.BASE_URL }}
          CLIENT_URL: ${{ env.CLIENT_URL }}
          NODE_ENV: production
          VITE_API_URL: ${{ env.VITE_API_URL }}
          VITE_MUI_LICENSE_KEY: ${{ env.VITE_MUI_LICENSE_KEY }}
          VITE_GTM_ID: ${{ env.VITE_GTM_ID }}
          VITE_DISABLE_OAUTH: "true"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ env.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Configure Docker auth
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Compute image URIs
        id: image
        env:
          IMAGE_NAME: ${{ steps.pr-vars.outputs.IMAGE_NAME }}
          # Use PR SHA when available (workflow_dispatch), otherwise use GITHUB_SHA (PR event)
          CODE_SHA: ${{ needs.detect-changes.outputs.pr_sha || github.sha }}
        run: |
          IMAGE_URI="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GCP_ARTIFACT_REPOSITORY}/${IMAGE_NAME}"
          echo "uri=${IMAGE_URI}" >> "$GITHUB_OUTPUT"
          echo "sha_tag=${IMAGE_URI}:${CODE_SHA}" >> "$GITHUB_OUTPUT"
          echo "latest_tag=${IMAGE_URI}:latest" >> "$GITHUB_OUTPUT"

      - name: Create .env.production for Docker build
        run: |
          cat <<EOF > .env.production
          VITE_API_URL=${VITE_API_URL}
          VITE_MUI_LICENSE_KEY=${VITE_MUI_LICENSE_KEY}
          VITE_GTM_ID=${VITE_GTM_ID}
          VITE_DISABLE_OAUTH=true
          EOF

      - name: Build Docker image
        run: docker build --platform linux/amd64 -t ${{ steps.image.outputs.sha_tag }} .

      - name: Tag Docker image as latest
        run: docker tag ${{ steps.image.outputs.sha_tag }} ${{ steps.image.outputs.latest_tag }}

      - name: Push Docker images
        run: |
          docker push ${{ steps.image.outputs.sha_tag }}
          docker push ${{ steps.image.outputs.latest_tag }}

      - name: Clean temporary env.production file
        run: rm -f .env.production

      # Handle ephemeral database if migrations changed OR manual rebuild requested
      # Step 1: Calculate ephemeral DB URL (when PR has migrations or rebuild requested)
      - name: Calculate ephemeral database URL
        id: ephemeral-db
        if: needs.detect-changes.outputs.migrations_changed == 'true' || needs.detect-changes.outputs.rebuild_ephemeral_db == 'true'
        env:
          STAGING_DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
        run: |
          echo "Setting up ephemeral database for PR #${PR_NUMBER}"

          # Create the ephemeral database URL
          # Format: mongodb+srv://user:pass@cluster/dbname?params -> mongodb+srv://user:pass@cluster/staging_pr_123?params
          # Must preserve query parameters (e.g., ?retryWrites=true&w=majority) which are essential for MongoDB Atlas
          EPHEMERAL_DB_NAME="staging_pr_${PR_NUMBER}"

          # Extract query string if present, then replace only the database name
          if [[ "$STAGING_DATABASE_URL" == *"?"* ]]; then
            QUERY_STRING="?${STAGING_DATABASE_URL#*\?}"
            BASE_URL="${STAGING_DATABASE_URL%%\?*}"
          else
            QUERY_STRING=""
            BASE_URL="$STAGING_DATABASE_URL"
          fi

          # Replace the database name in the base URL and re-append query string
          BASE_URL_NO_DB=$(echo "$BASE_URL" | sed 's|/[^/]*$||')
          EPHEMERAL_DB_URL="${BASE_URL_NO_DB}/${EPHEMERAL_DB_NAME}${QUERY_STRING}"

          echo "ephemeral_db_url=${EPHEMERAL_DB_URL}" >> "$GITHUB_OUTPUT"
          echo "using_ephemeral=true" >> "$GITHUB_OUTPUT"
          echo "Ephemeral database URL configured for: ${EPHEMERAL_DB_NAME}"

      # Step 2: Install MongoDB tools (only when rebuilding)
      - name: Install MongoDB Database Tools
        if: needs.detect-changes.outputs.rebuild_ephemeral_db == 'true'
        run: |
          wget -qO- https://www.mongodb.org/static/pgp/server-7.0.asc | sudo gpg --dearmor -o /usr/share/keyrings/mongodb.gpg
          echo "deb [signed-by=/usr/share/keyrings/mongodb.gpg] https://repo.mongodb.org/apt/ubuntu jammy/mongodb-org/7.0 multiverse" | sudo tee /etc/apt/sources.list.d/mongodb-org-7.0.list
          sudo apt-get update
          sudo apt-get install -y mongodb-database-tools mongodb-mongosh

      # Step 3: Clean up stale staging databases to free Atlas storage quota
      - name: Clean up stale staging databases
        if: needs.detect-changes.outputs.rebuild_ephemeral_db == 'true'
        env:
          STAGING_DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Checking for stale staging databases to free up storage..."
          # List all staging_pr_* databases and drop ones from closed/merged PRs
          STALE_DBS=$(mongosh "$STAGING_DATABASE_URL" --quiet --eval "
            const dbs = db.adminCommand({ listDatabases: 1 }).databases;
            const prDbs = dbs.filter(d => d.name.startsWith('staging_pr_'));
            prDbs.forEach(d => print(d.name));
          " 2>/dev/null || true)

          if [ -n "$STALE_DBS" ]; then
            CURRENT_DB="staging_pr_${PR_NUMBER}"
            while IFS= read -r db_name; do
              if [ -n "$db_name" ] && [ "$db_name" != "$CURRENT_DB" ]; then
                # Extract PR number and check if PR is still open
                pr_num=$(echo "$db_name" | sed 's/staging_pr_//')

                # Retry gh pr view up to 3 times with backoff to handle transient GitHub API failures.
                # If the state cannot be determined, we keep the database to avoid accidentally
                # dropping staging environments for open PRs during API outages or rate limiting.
                pr_state=""
                for attempt in 1 2 3; do
                  pr_state=$(gh pr view "$pr_num" --repo "${{ github.repository }}" --json state --jq '.state' 2>/dev/null) && break
                  echo "⚠️ gh pr view for PR #$pr_num failed (attempt $attempt/3), retrying in ${attempt}s..."
                  pr_state=""
                  sleep "$attempt"
                done

                if [ -z "$pr_state" ]; then
                  echo "⚠️ Could not determine state of PR #$pr_num after 3 attempts — keeping database $db_name to be safe"
                elif [ "$pr_state" = "MERGED" ] || [ "$pr_state" = "CLOSED" ]; then
                  echo "Dropping stale database: $db_name (PR #$pr_num is $pr_state)"
                  mongosh "$STAGING_DATABASE_URL" --quiet --eval "db.getSiblingDB('$db_name').dropDatabase()" || true
                else
                  echo "Keeping database: $db_name (PR #$pr_num is $pr_state)"
                fi
              fi
            done <<< "$STALE_DBS"
          fi
          echo "Stale database cleanup complete"

      # Step 4: Rebuild ephemeral database from production (only when rebuild requested)
      - name: Rebuild ephemeral database from production
        if: needs.detect-changes.outputs.rebuild_ephemeral_db == 'true'
        env:
          PROD_DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
          EPHEMERAL_DB_URL: ${{ steps.ephemeral-db.outputs.ephemeral_db_url }}
          STAGING_DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
        run: |
          set -o pipefail  # Ensure pipeline fails if any command fails

          EPHEMERAL_DB_NAME="staging_pr_${PR_NUMBER}"
          echo "Rebuilding ephemeral database: ${EPHEMERAL_DB_NAME}"

          # Drop existing ephemeral database if it exists (for clean rebuild)
          echo "Dropping existing ephemeral database if it exists..."
          mongosh "$EPHEMERAL_DB_URL" --eval "db.dropDatabase()" || true

          # Extract production database name from URL and build a base URI without the db path
          # Format: mongodb+srv://user:pass@cluster/dbname?params
          # mongodump errors with "cannot specify both a URI with a database and --db"
          # when the URI contains a database path AND --db is passed, so we strip the
          # database component from the URI and pass it separately via --db.
          if [[ "$PROD_DATABASE_URL" == *"?"* ]]; then
            PROD_DB_NAME=$(echo "$PROD_DATABASE_URL" | sed -E 's|.*/([^/?]+)\?.*|\1|')
            PROD_URI_NO_DB=$(echo "$PROD_DATABASE_URL" | sed -E 's|/[^/?]+\?|/?|')
          else
            PROD_DB_NAME=$(echo "$PROD_DATABASE_URL" | sed -E 's|.*/([^/]+)$|\1|')
            PROD_URI_NO_DB=$(echo "$PROD_DATABASE_URL" | sed -E 's|/[^/]+$||')
          fi
          echo "Production database name: $PROD_DB_NAME"

          # Dump from production and restore to ephemeral database using archive pipe
          # This approach preserves namespace metadata correctly for remapping
          # Exclude large collections that aren't needed for PR preview testing
          # to stay within Atlas storage quota limits
          EXCLUDE_COLLECTIONS=(
            "flow_executions"
            "webhook_events"
          )
          EXCLUDE_ARGS=""
          for col in "${EXCLUDE_COLLECTIONS[@]}"; do
            EXCLUDE_ARGS="${EXCLUDE_ARGS} --excludeCollection=${col}"
          done

          echo "Copying production database to ephemeral database: ${EPHEMERAL_DB_NAME}"
          echo "Excluding collections: ${EXCLUDE_COLLECTIONS[*]}"
          if ! mongodump --uri="$PROD_URI_NO_DB" --db="${PROD_DB_NAME}" ${EXCLUDE_ARGS} --gzip --archive | mongorestore --uri="$STAGING_DATABASE_URL" --gzip --archive \
            --nsInclude="${PROD_DB_NAME}.*" \
            --nsFrom="${PROD_DB_NAME}.*" \
            --nsTo="${EPHEMERAL_DB_NAME}.*"; then
            echo "❌ Failed to copy production database to ephemeral database"
            exit 1
          fi

          echo "✅ Production database successfully copied to ephemeral database: ${EPHEMERAL_DB_NAME}"

      - name: Set database URL
        id: db-url
        run: |
          if [ "${{ steps.ephemeral-db.outputs.using_ephemeral }}" == "true" ]; then
            echo "db_url=${{ steps.ephemeral-db.outputs.ephemeral_db_url }}" >> "$GITHUB_OUTPUT"
          else
            echo "db_url=${{ secrets.STAGING_DATABASE_URL }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy to Cloud Run
        id: deploy
        env:
          SERVICE_NAME: ${{ steps.pr-vars.outputs.SERVICE_NAME }}
        run: |
          gcloud run deploy ${SERVICE_NAME} \
            --image ${{ steps.image.outputs.sha_tag }} \
            --region ${GCP_REGION} \
            --timeout=600 \
            --memory=1Gi \
            --min-instances=0 \
            --max-instances=2 \
            --allow-unauthenticated \
            --network=mako-vpc \
            --subnet=mako-subnet \
            --vpc-egress=all-traffic \
            --set-env-vars BASE_URL=${BASE_URL} \
            --set-env-vars BCRYPT_ROUNDS=${BCRYPT_ROUNDS} \
            --set-env-vars CLIENT_URL=${CLIENT_URL} \
            --set-env-vars DASHBOARD_ARTIFACT_PREFIX=${DASHBOARD_ARTIFACT_PREFIX} \
            --set-env-vars DASHBOARD_ARTIFACT_STORE=gcs \
            --set-env-vars DATABASE_URL=${{ steps.db-url.outputs.db_url }} \
            --set-env-vars GCS_DASHBOARD_BUCKET=${GCS_DASHBOARD_BUCKET} \
            --set-env-vars DISABLE_OAUTH=true \
            --set-env-vars ENCRYPTION_KEY=${ENCRYPTION_KEY} \
            --set-env-vars GH_CLIENT_ID=${GH_CLIENT_ID} \
            --set-env-vars GH_CLIENT_SECRET=${GH_CLIENT_SECRET} \
            --set-env-vars GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID} \
            --set-env-vars GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET} \
            --set-env-vars INNGEST_EVENT_KEY=${INNGEST_EVENT_KEY} \
            --set-env-vars INNGEST_SIGNING_KEY=${INNGEST_SIGNING_KEY} \
            --set-env-vars NODE_ENV=production \
            --set-env-vars ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY} \
            --set-env-vars GOOGLE_GENERATIVE_AI_API_KEY=${GOOGLE_GENERATIVE_AI_API_KEY} \
            --set-env-vars OPENAI_API_KEY=${OPENAI_API_KEY} \
            --set-env-vars RATE_LIMIT_MAX_REQUESTS=${RATE_LIMIT_MAX_REQUESTS} \
            --set-env-vars RATE_LIMIT_WINDOW_MS=${RATE_LIMIT_WINDOW_MS} \
            --set-env-vars SENDGRID_API_KEY=${SENDGRID_API_KEY} \
            --set-env-vars SENDGRID_FROM_EMAIL=${SENDGRID_FROM_EMAIL} \
            --set-env-vars SENDGRID_INVITATION_TEMPLATE_ID=${SENDGRID_INVITATION_TEMPLATE_ID} \
            --set-env-vars SENDGRID_PASSWORD_RESET_TEMPLATE_ID=${SENDGRID_PASSWORD_RESET_TEMPLATE_ID} \
            --set-env-vars SENDGRID_VERIFICATION_TEMPLATE_ID=${SENDGRID_VERIFICATION_TEMPLATE_ID} \
            --set-env-vars SESSION_DURATION=${SESSION_DURATION} \
            --set-env-vars SESSION_SECRET=${SESSION_SECRET} \
            --set-env-vars VITE_API_URL=${VITE_API_URL} \
            --set-env-vars DEMO_DATABASE_URL=${DEMO_DATABASE_URL} \
            --quiet

          # Get the Cloud Run URL
          CLOUD_RUN_URL=$(gcloud run services describe ${SERVICE_NAME} --region ${GCP_REGION} --format='value(status.url)')
          echo "cloud_run_url=${CLOUD_RUN_URL}" >> "$GITHUB_OUTPUT"

      - name: Run migrations (ephemeral DB only)
        if: needs.detect-changes.outputs.migrations_changed == 'true' || needs.detect-changes.outputs.rebuild_ephemeral_db == 'true'
        env:
          DATABASE_URL: ${{ steps.db-url.outputs.db_url }}
        run: pnpm run migrate

      - name: Update Cloudflare KV with deployment URL
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_KV_NAMESPACE_ID: ${{ secrets.CLOUDFLARE_KV_NAMESPACE_ID }}
        run: |
          curl -X PUT "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/storage/kv/namespaces/${CLOUDFLARE_KV_NAMESPACE_ID}/values/${PR_NUMBER}" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: text/plain" \
            --data "${{ steps.deploy.outputs.cloud_run_url }}"

      - name: Comment on PR with deployment URL
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const previewUrl = `https://pr-${prNumber}.mako.ai`;
            const cloudRunUrl = `${{ steps.deploy.outputs.cloud_run_url }}`;
            const usingEphemeral = '${{ needs.detect-changes.outputs.migrations_changed }}' === 'true';
            const rebuiltDb = '${{ needs.detect-changes.outputs.rebuild_ephemeral_db }}' === 'true';
            const repo = context.repo;
            const rebuildUrl = `https://github.com/${repo.owner}/${repo.repo}/actions/workflows/deploy-app.yml`;

            let dbInfo = '📦 Shared staging';
            if (usingEphemeral) {
              const rebuildNote = rebuiltDb ? 'rebuilt from prod + migrations applied' : 'existing ephemeral DB';
              dbInfo = `🗄️ Ephemeral (${rebuildNote})

            > **Need to reset the database?** [Click here to rebuild](${rebuildUrl}) and run manually with:
            > - \`pr_number\`: \`${prNumber}\`
            > - \`rebuild_db\`: ✅ checked`;
            }

            const body = `## 🚀 Preview Deployment Ready

            | | |
            |---|---|
            | **Preview URL** | [${previewUrl}](${previewUrl}) |
            | **Cloud Run URL** | [${cloudRunUrl}](${cloudRunUrl}) |
            | **Database** | ${dbInfo} |
            | **OAuth** | ❌ Disabled (use email/password) |

            > **Note:** OAuth login is disabled for PR previews. Use email/password authentication for testing.
            `;

            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const botComment = comments.find(comment =>
              comment.user.type === 'Bot' &&
              (comment.body.includes('Preview Deployment Ready') || comment.body.includes('Preview Deployment Skipped'))
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: body,
              });
            }

  # Skip notification when no app changes detected
  skip-preview:
    name: Skip PR Preview (No Changes)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && needs.detect-changes.outputs.app_changed == 'false' && !(github.event_name == 'workflow_dispatch' && inputs.pr_number != '')
    needs: detect-changes
    steps:
      - name: Comment on PR about skipped deployment
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;

            const body = `## ⏭️ Preview Deployment Skipped

            No changes detected in app-related files. Deployment not needed.

            **Files that trigger deployment:**
            - \`api/**\` - Backend code
            - \`app/**\` - Frontend code
            - \`Dockerfile\` - Container definition
            - \`package.json\`, \`pnpm-lock.yaml\` - Dependencies
            - \`.github/workflows/deploy-app.yml\` - Workflow config
            `;

            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const botComment = comments.find(comment =>
              comment.user.type === 'Bot' &&
              (comment.body.includes('Preview Deployment Ready') || comment.body.includes('Preview Deployment Skipped'))
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: body,
              });
            }

  # Production Deployment
  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    # Only deploy to production from master branch - workflow_dispatch must also be on master
    if: (github.event_name == 'push' && github.ref == 'refs/heads/master') || (github.event_name == 'workflow_dispatch' && inputs.pr_number == '' && github.ref == 'refs/heads/master')
    environment:
      name: production
      url: https://app.mako.ai
    env:
      BASE_URL: https://app.mako.ai
      BCRYPT_ROUNDS: ${{ vars.BCRYPT_ROUNDS }}
      CLIENT_URL: https://app.mako.ai
      DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
      ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
      GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_DEV_SERVICE_ACCOUNT }}
      GH_CLIENT_ID: ${{ vars.GH_CLIENT_ID }}
      GH_CLIENT_SECRET: ${{ secrets.GH_CLIENT_SECRET }}
      GOOGLE_CLIENT_ID: ${{ vars.GOOGLE_CLIENT_ID }}
      GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
      IMAGE_NAME: mako
      INNGEST_EVENT_KEY: ${{ vars.INNGEST_EVENT_KEY }}
      INNGEST_SIGNING_KEY: ${{ secrets.INNGEST_SIGNING_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GOOGLE_GENERATIVE_AI_API_KEY: ${{ secrets.GOOGLE_GENERATIVE_AI_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      RATE_LIMIT_MAX_REQUESTS: ${{ vars.RATE_LIMIT_MAX_REQUESTS }}
      RATE_LIMIT_WINDOW_MS: ${{ vars.RATE_LIMIT_WINDOW_MS }}
      SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
      SENDGRID_FROM_EMAIL: ${{ vars.SENDGRID_FROM_EMAIL }}
      SENDGRID_INVITATION_TEMPLATE_ID: ${{ vars.SENDGRID_INVITATION_TEMPLATE_ID }}
      SENDGRID_PASSWORD_RESET_TEMPLATE_ID: ${{ vars.SENDGRID_PASSWORD_RESET_TEMPLATE_ID }}
      SENDGRID_VERIFICATION_TEMPLATE_ID: ${{ vars.SENDGRID_VERIFICATION_TEMPLATE_ID }}
      SERVICE_NAME: mako
      SESSION_DURATION: ${{ vars.SESSION_DURATION }}
      SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
      VITE_API_URL: https://app.mako.ai/api
      VITE_MUI_LICENSE_KEY: ${{ secrets.VITE_MUI_LICENSE_KEY }}
      VITE_GTM_ID: ${{ vars.VITE_GTM_ID }}
      DEMO_DATABASE_URL: ${{ secrets.DEMO_DATABASE_URL }}
      DASHBOARD_ARTIFACT_PREFIX: dashboard-artifacts/prod
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Always checkout master for production deploys to prevent accidental deployments from other branches
          ref: master

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint web app
        run: pnpm run --filter app lint

      - name: Lint API
        run: pnpm run --filter api lint

      - name: Build workspaces (Fail Fast Check)
        run: pnpm run build
        env:
          BASE_URL: ${{ env.BASE_URL }}
          CLIENT_URL: ${{ env.CLIENT_URL }}
          NODE_ENV: production
          VITE_API_URL: ${{ env.VITE_API_URL }}
          VITE_MUI_LICENSE_KEY: ${{ env.VITE_MUI_LICENSE_KEY }}
          VITE_GTM_ID: ${{ env.VITE_GTM_ID }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ env.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Configure Docker auth
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Compute image URIs
        id: image
        run: |
          IMAGE_URI="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GCP_ARTIFACT_REPOSITORY}/${IMAGE_NAME}"
          echo "uri=${IMAGE_URI}" >> "$GITHUB_OUTPUT"
          echo "sha_tag=${IMAGE_URI}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "latest_tag=${IMAGE_URI}:latest" >> "$GITHUB_OUTPUT"

      - name: Create .env.production for Docker build
        run: |
          cat <<EOF > .env.production
          VITE_API_URL=${VITE_API_URL}
          VITE_MUI_LICENSE_KEY=${VITE_MUI_LICENSE_KEY}
          VITE_GTM_ID=${VITE_GTM_ID}
          EOF

      - name: Build Docker image
        run: docker build --platform linux/amd64 -t ${{ steps.image.outputs.sha_tag }} .

      - name: Tag Docker image as latest
        run: docker tag ${{ steps.image.outputs.sha_tag }} ${{ steps.image.outputs.latest_tag }}

      - name: Push Docker images
        run: |
          docker push ${{ steps.image.outputs.sha_tag }}
          docker push ${{ steps.image.outputs.latest_tag }}

      - name: Clean temporary env.production file
        run: rm -f .env.production

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${SERVICE_NAME} \
            --image ${{ steps.image.outputs.sha_tag }} \
            --region ${GCP_REGION} \
            --timeout=600 \
            --memory=1Gi \
            --min-instances=1 \
            --network=mako-vpc \
            --subnet=mako-subnet \
            --vpc-egress=all-traffic \
            --set-env-vars BASE_URL=${BASE_URL} \
            --set-env-vars BCRYPT_ROUNDS=${BCRYPT_ROUNDS} \
            --set-env-vars CLIENT_URL=${CLIENT_URL} \
            --set-env-vars DASHBOARD_ARTIFACT_PREFIX=${DASHBOARD_ARTIFACT_PREFIX} \
            --set-env-vars DASHBOARD_ARTIFACT_STORE=gcs \
            --set-env-vars DATABASE_URL=${DATABASE_URL} \
            --set-env-vars GCS_DASHBOARD_BUCKET=${GCS_DASHBOARD_BUCKET} \
            --set-env-vars ENCRYPTION_KEY=${ENCRYPTION_KEY} \
            --set-env-vars GH_CLIENT_ID=${GH_CLIENT_ID} \
            --set-env-vars GH_CLIENT_SECRET=${GH_CLIENT_SECRET} \
            --set-env-vars GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID} \
            --set-env-vars GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET} \
            --set-env-vars INNGEST_EVENT_KEY=${INNGEST_EVENT_KEY} \
            --set-env-vars INNGEST_SIGNING_KEY=${INNGEST_SIGNING_KEY} \
            --set-env-vars NODE_ENV=production \
            --set-env-vars ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY} \
            --set-env-vars GOOGLE_GENERATIVE_AI_API_KEY=${GOOGLE_GENERATIVE_AI_API_KEY} \
            --set-env-vars OPENAI_API_KEY=${OPENAI_API_KEY} \
            --set-env-vars RATE_LIMIT_MAX_REQUESTS=${RATE_LIMIT_MAX_REQUESTS} \
            --set-env-vars RATE_LIMIT_WINDOW_MS=${RATE_LIMIT_WINDOW_MS} \
            --set-env-vars SENDGRID_API_KEY=${SENDGRID_API_KEY} \
            --set-env-vars SENDGRID_FROM_EMAIL=${SENDGRID_FROM_EMAIL} \
            --set-env-vars SENDGRID_INVITATION_TEMPLATE_ID=${SENDGRID_INVITATION_TEMPLATE_ID} \
            --set-env-vars SENDGRID_PASSWORD_RESET_TEMPLATE_ID=${SENDGRID_PASSWORD_RESET_TEMPLATE_ID} \
            --set-env-vars SENDGRID_VERIFICATION_TEMPLATE_ID=${SENDGRID_VERIFICATION_TEMPLATE_ID} \
            --set-env-vars SESSION_DURATION=${SESSION_DURATION} \
            --set-env-vars SESSION_SECRET=${SESSION_SECRET} \
            --set-env-vars VITE_API_URL=${VITE_API_URL} \
            --set-env-vars DEMO_DATABASE_URL=${DEMO_DATABASE_URL} \
            --quiet

      - name: Run database migrations
        run: pnpm run migrate
