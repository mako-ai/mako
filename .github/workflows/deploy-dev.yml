name: Deploy Dev to Cloud Run

on:
  push:
    branches:
      - dev
  workflow_dispatch:

concurrency:
  group: dev-cloud-run
  cancel-in-progress: true

env:
  SERVICE_NAME: dev-mako
  IMAGE_NAME: dev-mako
  BASE_URL: https://dev-app.mako.ai
  CLIENT_URL: https://dev-app.mako.ai
  VITE_API_URL: https://dev-app.mako.ai/api
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  GCP_REGION: ${{ vars.GCP_REGION }}
  GCP_ARTIFACT_REPOSITORY: ${{ vars.GCP_ARTIFACT_REPOSITORY }}

permissions:
  contents: read
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint web app
        run: pnpm run --filter app lint

      - name: Lint API
        run: pnpm run --filter api lint

      - name: Build workspaces
        run: pnpm run build
        env:
          BASE_URL: ${{ env.BASE_URL }}
          CLIENT_URL: ${{ env.CLIENT_URL }}
          VITE_API_URL: ${{ env.VITE_API_URL }}
          VITE_MUI_LICENSE_KEY: ${{ secrets.DEV_VITE_MUI_LICENSE_KEY }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_DEV_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Configure Docker auth
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Compute image URIs
        id: image
        run: |
          IMAGE_URI="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GCP_ARTIFACT_REPOSITORY}/${IMAGE_NAME}"
          echo "uri=${IMAGE_URI}" >> "$GITHUB_OUTPUT"
          echo "sha_tag=${IMAGE_URI}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "latest_tag=${IMAGE_URI}:latest" >> "$GITHUB_OUTPUT"

      - name: Create .env.production for Docker build
        run: |
          cat <<EOF > .env.production
          VITE_API_URL=${VITE_API_URL}
          VITE_MUI_LICENSE_KEY=${{ secrets.DEV_VITE_MUI_LICENSE_KEY }}
          EOF

      - name: Build Docker image
        run: docker build --platform linux/amd64 -t ${{ steps.image.outputs.sha_tag }} .

      - name: Tag Docker image as latest
        run: docker tag ${{ steps.image.outputs.sha_tag }} ${{ steps.image.outputs.latest_tag }}

      - name: Push Docker images
        run: |
          docker push ${{ steps.image.outputs.sha_tag }}
          docker push ${{ steps.image.outputs.latest_tag }}

      - name: Clean temporary env.production file
        if: always()
        run: rm -f .env.production

      - name: Render Cloud Run env file
        run: |
          cat <<'EOF' > env.dev.yaml
          ${{ secrets.DEV_ENV_YAML }}
          EOF

      - name: Deploy to Cloud Run (dev)
        run: |
          gcloud run deploy ${SERVICE_NAME} \
            --image ${{ steps.image.outputs.sha_tag }} \
            --region ${GCP_REGION} \
            --timeout=600 \
            --min-instances=1 \
            --env-vars-file env.dev.yaml \
            --set-env-vars BASE_URL=${BASE_URL},CLIENT_URL=${CLIENT_URL},VITE_API_URL=${VITE_API_URL} \
            --quiet

      - name: Cleanup env file
        if: always()
        run: rm -f env.dev.yaml
