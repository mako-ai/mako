<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="kvGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F6821F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FAAD3F;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="url(#kvGradient)"/>
  <!-- KV symbol - Key icon stylized -->
  <g fill="#fff">
    <!-- Key head (circle with notch) -->
    <circle cx="48" cy="44" r="16" fill="none" stroke="#fff" stroke-width="6"/>
    <circle cx="48" cy="44" r="6" fill="#fff"/>
    <!-- Key shaft -->
    <rect x="60" y="41" width="32" height="6" rx="2" fill="#fff"/>
    <!-- Key teeth -->
    <rect x="76" y="47" width="6" height="10" rx="1" fill="#fff"/>
    <rect x="86" y="47" width="6" height="14" rx="1" fill="#fff"/>
    <!-- Value indicator (arrow pointing to data) -->
    <path d="M40 70 L88 70 L88 64 L100 76 L88 88 L88 82 L40 82 Z" fill="#fff" opacity="0.9"/>
  </g>
</svg>
